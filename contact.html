<section>
  <div class="wrap" style="max-width: 640px;">
    <div class="section-head">
      <p class="eyebrow">Terminal</p>
      <h1>Get in Touch</h1>
      <p>Send a message through the console below, or connect through one of the ports.</p>
    </div>

    <form class = "terminal-form" action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="1a00068b-7526-40a6-8687-fd9d785f72d1">
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Jane Doe" autocomplete="name">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="jane@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Let's talk about..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Send Message</button>
      <p class="form-status" role="status" aria-live="polite"></p>
    </form>

    <div class="contact-ports">
      <a href="danielmorin544@gmail.com" class="port-link">✉ Email</a>
      <a href="#" class="port-link">🔗 LinkedIn</a>
      <a href="https://github.com/danielmorin544-droid" class="port-link">🐙 GitHub</a>
    </div>
    <br>
    <p><i>LinkedIn is a work in progress</i></p>
  </div>
</section>
